---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fastapi-hr-git
  namespace: flux-system
spec:
  chart:
    spec:
      chart: fastapi-chart
      #reconcileStrategy: ChartVersion
      sourceRef:
        kind: GitRepository
        name: fastapi-repo-git
  interval: 1m0s